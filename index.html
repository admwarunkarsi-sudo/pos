<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Warunk Arsi POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-emerald-700 p-4 text-white shadow">
        <div class="max-w-4xl mx-auto flex justify-between">
            <h1 class="font-bold">WARUNK ARSI POS</h1>
            <button onclick="location.reload()" class="bg-emerald-800 px-3 py-1 rounded text-xs">Refresh</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="order-list" class="space-y-3">
            <!-- Orderan bakal muncul di sini -->
        </div>
    </main>

    <script>
        const supabase = supabase.createClient('https://tcaizfemtfmfeuutgbct.supabase.co', 'sb_publishable_3SBNDNn6tk9Ssl6dZOxi6Q_e2ZFFH14');

        async function initPOS() {
            const listDiv = document.getElementById('order-list');
            listDiv.innerHTML = "Memuat data...";

            // Ambil semua order, filter status 'Antrean'
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .eq('status', 'Antrean')
                .order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = "Error database: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                listDiv.innerHTML = "<div class='bg-white p-4 rounded shadow'>Belum ada pesanan baru.</div>";
                return;
            }

            listDiv.innerHTML = data.map(order => `
                <div class="bg-white p-4 rounded shadow flex justify-between items-center">
                    <div>
                        <p class="font-bold">#${order.order_id} - ${order.member_name}</p>
                        <p class="text-xs text-gray-500">Total: Rp ${order.total_harga.toLocaleString()}</p>
                    </div>
                    <button onclick="batalkan('${order.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-xs font-bold">Batalkan</button>
                </div>
            `).join('');
        }

        async function batalkan(id) {
            if(!confirm('Yakin batalkan pesanan ini?')) return;
            const { error } = await supabase.from('orders').update({ status: 'Batal' }).eq('id', id);
            if(error) alert('Gagal: ' + error.message);
            else initPOS();
        }

        initPOS();
    </script>
</body>
</html>
