<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warunk Arsi - Pusat Kendali POS Kasir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-4 font-sans">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex flex-col sm:flex-row justify-between items-center bg-emerald-700 text-white p-4 rounded-2xl shadow gap-4">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cash-register text-2xl text-amber-300"></i>
                <div>
                    <h1 class="text-xl font-bold font-mono tracking-wide">WARUNK ARSI PUSAT KENDALI</h1>
                    <p class="text-xs text-emerald-200">Sistem Kasir & Sinkronisasi Member Cloud</p>
                </div>
            </div>
            <div class="flex space-x-2 text-xs">
                <button onclick="switchTab('antrean')" id="tab-antrean" class="bg-amber-500 text-white font-bold px-4 py-2 rounded-xl shadow">Antrean & Member</button>
                <button onclick="switchTab('manajemen')" id="tab-manajemen" class="bg-emerald-800 hover:bg-emerald-900 text-white font-bold px-4 py-2 rounded-xl">Kelola Menu</button>
            </div>
        </div>

        <div id="panel-antrean" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-3">
                <h2 class="font-bold text-gray-700 flex items-center gap-2 text-sm uppercase"><i class="fa-solid fa-clock text-amber-500 animate-pulse"></i> Pesanan Masuk Real-Time</h2>
                <div id="kasir-orders-list" class="space-y-3"></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-xs h-[500px] flex flex-col">
                <h3 class="font-bold text-gray-700 border-b pb-2 mb-3 uppercase flex justify-between"><span>Poin Member VVIP</span> <button onclick="loadData()" class="text-emerald-600 hover:underline">Refresh</button></h3>
                <div id="kasir-members-list" class="space-y-2 flex-1 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <div id="modal-detail-pesanan" class="fixed inset-0 bg-black/50 z-50 hidden justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-xl max-h-[90vh] flex flex-col overflow-hidden">
            <div id="modal-header-bg" class="bg-emerald-700 text-white p-4 flex justify-between items-center">
                <div>
                    <span id="modal-order-id" class="bg-white/20 text-white font-mono font-bold text-xs px-2 py-0.5 rounded">ID: -</span>
                    <h3 id="modal-member-name" class="font-bold text-base mt-1">-</h3>
                </div>
                <button onclick="closeOrderModal()" class="text-white text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto space-y-4 text-xs">
                <button id="modal-btn-whatsapp" class="w-full bg-green-600 text-white font-bold py-2.5 rounded-xl"><i class="fa-brands fa-whatsapp"></i> Hubungi WhatsApp</button>
                <div class="border-b pb-3">
                    <p class="text-gray-400 font-bold uppercase tracking-wider text-[10px]">Daftar Menu</p>
                    <div id="modal-items-list" class="mt-2 divide-y divide-gray-100"></div>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">Catatan Pelanggan:</p>
                    <p id="modal-order-note" class="text-xs font-medium text-gray-700 mt-1">-</p>
                </div>
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                    <span class="font-bold text-gray-600">Total</span>
                    <span id="modal-total-price" class="text-emerald-600 font-black text-sm">Rp 0</span>
                </div>
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-between gap-2">
                <button id="modal-btn-cancel" class="bg-red-100 text-red-600 font-bold px-4 py-2 rounded-xl text-xs"><i class="fa-solid fa-ban"></i> Batalkan</button>
                <button id="modal-btn-action" class="bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl text-xs">Selesai</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://tcaizfemtfmfeuutgbct.supabase.co', 'sb_publishable_3SBNDNn6tk9Ssl6dZOxi6Q_e2ZFFH14');
        let currentOrdersCache = [];

        async function fetchOrders() {
            const { data: orders } = await _supabase.from('orders').select('*').eq('status', 'Antrean').order('created_at', { ascending: false });
            const container = document.getElementById('kasir-orders-list');
            if(!orders || orders.length === 0) {
                container.innerHTML = '<p class="bg-white p-4 rounded-xl text-center text-gray-400 text-xs">Belum ada antrean.</p>';
                return;
            }
            currentOrdersCache = orders;
            container.innerHTML = orders.map(order => `
                <div onclick="openOrderModal('${order.order_id}')" class="bg-white border-l-4 border-emerald-600 p-4 rounded-xl shadow-sm flex justify-between items-center cursor-pointer hover:bg-emerald-50">
                    <div>
                        <span class="font-mono font-bold text-xs bg-emerald-100 px-2 py-0.5 rounded">${order.order_id}</span>
                        <span class="font-bold text-sm ml-2">${order.member_name}</span>
                        <p class="text-[10px] text-gray-400 mt-1 truncate max-w-[200px]">Catatan: ${order.catatan || '-'}</p>
                    </div>
                    <p class="font-black text-emerald-700 text-xs">Rp ${order.total_harga.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function openOrderModal(orderId) {
            const order = currentOrdersCache.find(o => o.order_id === orderId);
            document.getElementById('modal-order-id').innerText = order.order_id;
            document.getElementById('modal-member-name').innerText = order.member_name;
            document.getElementById('modal-order-note').innerText = order.catatan || '-';
            document.getElementById('modal-items-list').innerHTML = order.detail_items.map(i => `
                <div class="flex justify-between py-2 text-xs">
                    <span>${i.nama} x${i.qty}</span>
                    <span class="font-bold">Rp ${(i.harga * i.qty).toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('modal-btn-cancel').onclick = () => batalkanOrder(order.id);
            document.getElementById('modal-detail-pesanan').classList.remove('hidden');
        }

        async function batalkanOrder(dbId) {
            if(!confirm('Batalin pesanan ini?')) return;
            await _supabase.from('orders').update({ status: 'Batal' }).eq('id', dbId);
            closeOrderModal();
            fetchOrders();
        }

        function closeOrderModal() { document.getElementById('modal-detail-pesanan').classList.add('hidden'); }
        function loadData() { fetchOrders(); }
        window.onload = () => { fetchOrders(); setInterval(fetchOrders, 5000); };
    </script>
</body>
</html>
